name: Matrix exclude demo
on:
  push:
    brnaches: [main]
jobs:
 matrix-test:
 runs-on: ${{ matrix.os }}  
 strategy:
   fail-fast: false
   matrix:
     os: [ubuntu-latest, windows-latest] 
     python-version: ["3.10", "3.11", "3.12"]

   exclude:
     os: windows-latest
     python-version: "3.10"
 steps:
   - name: checkout Repository    
     uses: actions/checkout@v4

   - name: setup python
     uses: actions/setup-python@v5
     with:
       python: print-version ${{ matrix.python-version }}
   - name: print python version
     run: python --version   
