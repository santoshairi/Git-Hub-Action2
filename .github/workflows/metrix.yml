name: Matrix build
on:
 push:

job:
  matrix-test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: [3.10, 3.11, 3.12]
    steps:
     - name: Setup python
       uses: actions/setup-python@v5

       with:
         python-version: ${{ matrix.python-version }}    

     - name: show python version
       run: python --version
            

